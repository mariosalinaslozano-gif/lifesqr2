<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - LifeQR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="css/site.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><img src="Images/logo.png" alt="LifeQR Logo" style="height:50px;"></a>
            <div class="navbar-collapse d-flex justify-content-end" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="learn-more.html">Learn More</a></li>
                    <li class="nav-item"><a class="nav-link" href="search.html">Search Memorials</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html"><i class="bi bi-cart3 me-1"></i>Cart</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html"><i class="bi bi-person me-1"></i>Login</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-primary text-white ms-2 px-3 active" href="create-account.html">Create Account</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="py-5" style="background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="text-center mb-4">
                        <img src="Images/example6.jpg" alt="Create Account" class="img-fluid rounded shadow" style="max-height: 200px; object-fit: cover; width: 100%;">
                    </div>
                    <div class="card shadow border-0">
                        <div class="card-body p-4 p-md-5">
                            <h2 class="section-title text-center mb-2">Create Your Memorial Account</h2>
                            <p class="page-subtitle text-center mb-4">Start building a digital tribute for your loved one.</p>
                            <form id="createAccountForm">
                                <div class="mb-3">
                                    <label for="name" class="form-label">Full Name</label>
                                    <input type="text" class="form-control" id="name" required>
                                </div>
                                <div class="mb-3">
                                    <label for="dob" class="form-label">Date of Birth</label>
                                    <input type="date" class="form-control" id="dob" required>
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email Address</label>
                                    <input type="email" class="form-control" id="email" required>
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="password" minlength="8" required>
                                </div>
                                <div class="mb-4">
                                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                                    <input type="password" class="form-control" id="confirmPassword" minlength="8" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Create Account</button>
                            </form>
                            <hr class="my-4">
                            <p class="text-center mb-0">
                                Already have an account?
                                <a href="login.html" class="text-decoration-none">Login</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="site-footer text-white py-5">
        <div class="container text-center">
            <img src="Images/buttomLogo.png" alt="LifeQR" class="site-footer-logo mb-3">
            <div class="site-footer-links d-flex flex-wrap justify-content-center align-items-center gap-3 mb-3">
                <a href="#" class="text-white-50 text-decoration-none">Facebook</a>
                <a href="#" class="text-white-50 text-decoration-none">Instagram</a>
                <a href="learn-more.html" class="text-white-50 text-decoration-none">Learn More</a>
                <a href="#" class="text-white-50 text-decoration-none">FAQ</a>
                <a href="search.html" class="text-white-50 text-decoration-none">Find Memorial</a>
            </div>
            <p class="mb-0">&copy; 2024 Life's QR</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/site.js"></script>
    <script>
        document.getElementById('createAccountForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const dob = document.getElementById('dob').value;
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alert('Passwords do not match.');
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, dob, email, password })
                });

                const data = await response.json();
                if (!response.ok) {
                    alert(data.message || 'Account creation failed.');
                    return;
                }

                alert(data.message || 'Registration successful.');
                window.location.href = 'login.html';
            } catch (err) {
                alert('Unable to reach backend service.');
            }
        });
    </script>
</body>
</html>
